{% extends 'base.html' %}

{% block title %}Server Error - Raffle System{% endblock %}

{% block content %}
<div
    class="min-h-screen bg-[#0A0D14] flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 relative overflow-hidden">

    <!-- Decorative Background Elements -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-red-500/5 rounded-full blur-3xl pointer-events-none">
    </div>

    <div class="text-center relative z-10 w-full max-w-lg">
        <div
            class="text-[150px] font-black text-transparent bg-clip-text bg-gradient-to-b from-red-500 to-red-500/20 leading-none mb-6">
            500
        </div>

        <h1 class="text-3xl font-bold text-white mb-4">Something went wrong.</h1>
        <p class="text-gray-400 mb-10 text-lg">
            Our servers encountered an unexpected error. Please try again later or contact our support team if the
            problem persists.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'home' %}"
                class="inline-flex items-center justify-center gap-3 bg-white text-black font-black py-4 px-8 rounded-2xl hover:bg-gray-200 transition-all">
                Return Home
            </a>
            <a href="{% url 'raffle:contact_us' %}"
                class="inline-flex items-center justify-center gap-3 bg-[#111827] border border-gray-800 text-white font-semibold py-4 px-8 rounded-2xl hover:border-gray-700 transition-all">
                Contact Support
            </a>
        </div>
    </div>
</div>
{% endblock %}
