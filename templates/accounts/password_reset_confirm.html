{% extends 'base.html' %}

{% block title %}Set New Password | Raffle System{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#0A0F12] py-20 px-4">
    <div class="max-w-md w-full bg-[#0F172A] border border-white/5 rounded-[3rem] p-12 shadow-2xl animate-fade-in-up">

        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white mb-2">New Security</h1>
            <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Choose a strong password</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">New
                        Password</label>
                    <input type="password" name="password" required
                        class="w-full bg-black/40 border border-white/10 text-white px-6 py-4 rounded-2xl outline-none focus:border-[#A2F625] transition font-bold text-sm">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Confirm
                        Password</label>
                    <input type="password" name="confirm_password" required
                        class="w-full bg-black/40 border border-white/10 text-white px-6 py-4 rounded-2xl outline-none focus:border-[#A2F625] transition font-bold text-sm">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-[#A2F625] text-black font-black uppercase tracking-tighter py-5 rounded-2xl hover:bg-white transition-all transform active:scale-95 shadow-xl shadow-[#A2F625]/10 mt-6">
                Update Password →
            </button>
        </form>
    </div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out forwards;
    }
</style>
{% endblock %}
