{% extends 'base.html' %}

{% block title %}Reset Password | Raffle System{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#0A0F12] py-20 px-4">
    <div class="max-w-md w-full bg-[#0F172A] border border-white/5 rounded-[3rem] p-12 shadow-2xl animate-fade-in-up">

        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white mb-2">Identify Email</h1>
            <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">We'll send a reset code</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">Email
                        Address</label>
                    <input type="email" name="email" required placeholder="name@example.com"
                        class="w-full bg-black/40 border border-white/10 text-white px-6 py-4 rounded-2xl outline-none focus:border-[#A2F625] transition font-bold text-sm">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-[#A2F625] text-black font-black uppercase tracking-tighter py-5 rounded-2xl hover:bg-white transition-all transform active:scale-95 shadow-xl shadow-[#A2F625]/10 mt-6">
                Send Reset Code →
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="{% url 'accounts:login' %}"
                class="text-gray-400 hover:text-white transition text-[10px] font-black uppercase tracking-widest">Back
                to Login</a>
        </div>
    </div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in-up {
        animation: fadeInUp 0.6s ease-out forwards;
    }
</style>
{% endblock %}
