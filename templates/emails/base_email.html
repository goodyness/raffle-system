<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ subject|default:"Message from Raffle System" }}</title>
</head>

<body
    style="margin: 0; padding: 0; background: #f5f7fa; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #1A252B;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%"
        style="background: #f5f7fa; padding: 20px 0;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" width="600"
                    style="background: #ffffff; border-radius: 12px; overflow: hidden;">

                    <!-- Header -->
                    <tr>
                        <td align="center" style="background: #1A252B; padding: 24px;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 24px;">RAFFLE SYSTEM</h1>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding: 32px;">
                            {% block content %}
                            <!-- Content from child template will go here -->
                            {% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="background: #f0f3f5; padding: 20px; font-size: 13px; color: #6b7280;">
                            <p style="margin: 4px 0;">You’re receiving this email because you’re part of our Raffle
                                System community.</p>
                            <p style="margin: 4px 0;">&copy; {{ year|default:2026 }} Raffle System. All rights reserved.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
