{% extends 'base.html' %}

{% block title %}Page Not Found - Raffle System{% endblock %}

{% block content %}
<div
    class="min-h-screen bg-[#0A0D14] flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8 relative overflow-hidden">

    <!-- Decorative Background Elements -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-[#A2F625]/5 rounded-full blur-3xl pointer-events-none">
    </div>

    <div class="text-center relative z-10 w-full max-w-lg">
        <div
            class="text-[150px] font-black text-transparent bg-clip-text bg-gradient-to-b from-[#A2F625] to-[#A2F625]/20 leading-none mb-6">
            404
        </div>

        <h1 class="text-3xl font-bold text-white mb-4">You seem to be lost.</h1>
        <p class="text-gray-400 mb-10 text-lg">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>

        <a href="{% url 'home' %}"
            class="inline-flex items-center gap-3 bg-[#A2F625] text-black font-black py-4 px-8 rounded-2xl hover:bg-[#8CD81B] transition-all transform hover:scale-[1.02] shadow-[0_0_20px_rgba(162,246,37,0.3)]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            Return to Homepage
        </a>
    </div>
</div>
{% endblock %}
